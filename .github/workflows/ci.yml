name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-typecheck:
    name: Build and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS credentials for CodeArtifact
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_CI_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_CI_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Authenticate with CodeArtifact
        run: |
          aws codeartifact login \
            --tool npm \
            --domain takaro \
            --domain-owner $(echo "${{ secrets.AWS_ECR_REGISTRY }}" | cut -d. -f1) \
            --repository takaro-private \
            --region eu-west-3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS credentials for CodeArtifact
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ECR_CI_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_CI_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Authenticate with CodeArtifact
        run: |
          aws codeartifact login \
            --tool npm \
            --domain takaro \
            --domain-owner $(echo "${{ secrets.AWS_ECR_REGISTRY }}" | cut -d. -f1) \
            --repository takaro-private \
            --region eu-west-3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ECR_CI_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_CI_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-west-3

      - name: Bootstrap Takaro stack
        env:
          AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
        run: bash scripts/ci-bootstrap.sh

      - name: Run tests
        run: npm test

      - name: Capture docker compose logs
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs > docker-logs.txt 2>&1

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes --remove-orphans
