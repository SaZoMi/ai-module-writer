services:
  paper:
    image: itzg/minecraft-server
    ports:
      - "25665:25565"
      - "25675:25575"
    environment:
      - EULA=TRUE
      - TYPE=PAPER
      - VERSION=1.21.11
      - ONLINE_MODE=false
      - ENABLE_RCON=true
      - RCON_PASSWORD=${RCON_PASSWORD:-takaro123}
      - TAKARO_REGISTRATION_TOKEN=${TAKARO_REGISTRATION_TOKEN}
      - TAKARO_IDENTITY_TOKEN=${TAKARO_MC_IDENTITY_TOKEN:-nca-ai-paper}
      - TAKARO_WS_URL=${TAKARO_WS_URL:-wss://connect.takaro.io}
    volumes:
      - ./_data/paper:/data
    restart: unless-stopped

  bot:
    build: ./bot
    ports:
      - "3101:3001"
    environment:
      - MC_HOST=paper
      - MC_PORT=25565
      - BOT_USERNAME=Bot
      - BOT_API_PORT=3001
    depends_on:
      - paper
    restart: unless-stopped
